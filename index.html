<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Zeiterfassung</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Zeiterfassung">
<meta name="theme-color" content="#f5f5f5">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<script>
(function () {
  var mode = localStorage.getItem("themeMode") || "system";
  var effective = mode === "system"
    ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
    : mode;
  document.documentElement.setAttribute("data-theme", effective);
})();
</script>
</head>
<body>
<header class="topbar">
  <h1>Zeiterfassung</h1>
  <button id="settingsBtn" class="icon-btn" aria-label="Einstellungen">⚙</button>
</header>

<main>
  <section class="timer-card">
    <div id="timerDisplay" class="timer-display">00:00:00</div>
    <input id="projectInput" type="text" placeholder="Projekt / Aufgabe" autocomplete="off">
    <div class="btn-row">
      <button id="startBtn" class="btn btn-primary">Start</button>
      <button id="stopBtn" class="btn btn-danger" disabled>Stop</button>
    </div>
  </section>

  <section class="manual-card">
    <h2>Manueller Eintrag</h2>
    <div class="tabs">
      <button type="button" class="tab-btn active" data-type="time">Zeit</button>
      <button type="button" class="tab-btn" data-type="km">Kilometer</button>
    </div>
    <form id="manualForm" class="manual-form">
      <input type="text" id="mProject" placeholder="Projekt / Aufgabe" required>
      <input type="date" id="mDate" required>
      <div class="row" id="timeFields">
        <input type="time" id="mStart" required>
        <input type="time" id="mEnd" required>
      </div>
      <div class="row hidden" id="kmFields">
        <input type="number" id="mKm" placeholder="Kilometer" min="0" step="0.1" inputmode="decimal">
      </div>
      <input type="text" id="mNote" placeholder="Notiz (optional)">
      <div id="mPreview" class="duration-preview"></div>
      <button type="submit" class="btn btn-secondary">Hinzufügen</button>
    </form>
  </section>

  <section class="entries-card">
    <div class="entries-header">
      <h2>Einträge</h2>
      <button id="syncBtn" class="btn btn-small">Synchronisieren</button>
    </div>
    <ul id="entriesList" class="entries-list"></ul>
  </section>
</main>

<div id="settingsModal" class="modal hidden">
  <div class="modal-content">
    <h2>Einstellungen</h2>
    <label for="scriptUrl">Google Apps Script Web-App URL</label>
    <input type="url" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
    <p class="hint">Diese URL bekommst du beim Deployen des Apps Script (siehe README).</p>

    <label for="kmRate">Kilometerpauschale (€ pro km)</label>
    <input type="number" id="kmRate" step="0.01" min="0" placeholder="0.30">

    <label for="themeSelect">Design</label>
    <select id="themeSelect">
      <option value="system">System</option>
      <option value="light">Hell</option>
      <option value="dark">Dunkel</option>
    </select>

    <div class="btn-row">
      <button id="saveSettingsBtn" class="btn btn-primary">Speichern</button>
      <button id="closeSettingsBtn" class="btn btn-secondary">Schließen</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
